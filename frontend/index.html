<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/style.css">
    <title>PixiJS - Template</title>
</head>

<body>
    <div id="app">
        <div id="main-page" class="page">
            <h1>Lobbies</h1>
            <button id="create-lobby-btn">Create lobby</button>
            <ul id="lobby-list"></ul>
        </div>
        <div id="lobby-page" class="page hidden">
            <h1 id="lobby-title">Lobby</h1>
            <ul id="lobby-users-list"></ul>
            <button id="start-lobby-btn" class="hidden">Start</button>
            <p>Waiting for host to start.</p>
        </div>
        <div id="pixi-container" class="hidden"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
