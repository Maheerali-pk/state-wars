<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/style.css">
    <title>PixiJS - Template</title>
</head>

<body>
    <div id="app">
        <div id="main-page" class="page">
            <section class="hud-card">
                <header class="page-header">
                    <p class="eyebrow">Matchmaking</p>
                    <h1>StateIO Lobbies</h1>
                    <p class="page-subtitle">Create a room or join an active match with your squad.</p>
                </header>
                <div class="page-actions">
                    <button id="create-lobby-btn" class="btn btn-primary">Create lobby</button>
                    <p id="connection-status" class="status-badge">Connecting...</p>
                </div>
                <ul id="lobby-list" class="lobby-list"></ul>
            </section>
        </div>
        <div id="lobby-page" class="page hidden">
            <section class="hud-card">
                <header class="page-header">
                    <p class="eyebrow">Lobby Room</p>
                    <h1 id="lobby-title">Lobby</h1>
                    <p id="lobby-subtitle" class="page-subtitle">Invite players and get ready.</p>
                </header>
                <p id="player-count-badge" class="status-badge">0 players</p>
                <ul id="lobby-users-list" class="player-list"></ul>
                <div class="lobby-footer">
                    <p id="lobby-waiting-text" class="muted-text">Waiting for host to start.</p>
                    <button id="start-lobby-btn" class="btn btn-primary hidden">Start match</button>
                </div>
            </section>
        </div>
        <div id="pixi-container" class="hidden"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
